<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
      
      body {
        margin: 0;
        padding: 30px 0;
        font-family: 'Poppins', 'Helvetica Neue', sans-serif;
        color: #1e2a3e;
        background-color: #f4f7fc;
      }
      
      .container {
        margin: 0 auto;
        width: 100%;
        max-width: 580px;
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        border: 2px solid #FEA812;
      }
      
      .header {
        text-align: center;
        padding: 35px 20px 20px;
        background: linear-gradient(135deg, #0002DF 0%, #0005B0 100%);
      }
      
      .logo {
        max-width: 140px;
        margin-bottom: 15px;
      }
      
      .header-title {
        font-size: 24px;
        font-weight: 600;
        color: #FEA812;
        margin: 0;
        letter-spacing: -0.3px;
      }
      
      .content {
        padding: 35px 30px 25px;
        background-color: #ffffff;
      }
      
      .highlight {
        background-color: #FDB51F;
        border-left: 4px solid #0002DF;
        padding: 16px 20px;
        border-radius: 12px;
        margin: 20px 0;
        font-size: 14px;
        color: #1e2a3e;
      }
      
      .highlight strong {
        color: #0002DF;
      }
      
      .footer {
        text-align: center;
        padding: 20px 20px 25px;
        background-color: #f8fafd;
        border-top: 1px solid #e2e8f0;
        font-size: 12px;
        color: #5a6874;
      }
      
      .footer a {
        color: #0002DF !important;
      }
      
      .email-info {
        text-align: center;
        font-size: 12px;
        color: #5a6874;
        margin-top: 20px;
        background-color: #f8fafd;
        padding: 10px;
      }
      
      .email-info a {
        color: #FF0000;
        text-decoration: none;
        font-weight: 500;
      }
      
      hr {
        border: none;
        border-top: 2px solid #FEA812;
        margin: 0;
      }
      
      .content p a {
        color: #0002DF;
        font-weight: 600;
        text-decoration: none;
      }
      
      .content p a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          src="https://api-prod.favorhelp.com/uploads/fpay/logo.png"
          alt="F-Pay"
          class="logo"
        />
        <h1 class="header-title">{{ title }}</h1>
      </div>
      <div class="content">
        <strong style="font-size: 18px; color: #0002DF;">{{ greeting }}</strong>
        <p style="margin-top: 12px; line-height: 1.5">{{ message }}</p>
        <div class="highlight">
          <strong style="color: #0002DF;">{{ credentials_label }}</strong><br />
          {{ phone_label }}<br />
          {{ account_label }}<br />
          <strong style="color: #FF0000;">{{ password_label }}</strong>
        </div>
        <p style="font-size: 14px; margin-top: 20px">{{ recommend }}</p>
        <p style="margin-top: 20px; font-size: 14px">{{ support }}</p>
      </div>
      <hr />
      <div class="footer">
        {{ footer }}<br />
        <a href="https://fpay.com" style="color: #0002DF;">fpay.com</a>
      </div>
    </div>
    <div class="email-info">
      {{ sent_to }} <a href="mailto:{{ email }}">{{ email }}</a>
    </div>
    <div class="email-info" style="color: #0005B0;">{{ copyright }}</div>
  </body>
</html>
