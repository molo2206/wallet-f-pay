<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Transfer Processing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      background: #f4f5f7;
      font-family: 'Inter', sans-serif;
    }

    .email-card {
      width: 100%;
      max-width: 650px;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid #ececec;
      box-shadow:
        0 10px 25px rgba(0, 0, 0, .08),
        0 25px 60px rgba(0, 0, 0, .12);
    }

    /* Header */

    .header {
      width: 230px;
      height: 90px;
      background: #FFD100;
      border-bottom-right-radius: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 145px;
      height: auto;
    }

    /* Content */

    .content {
      padding: 60px;
    }

    h1 {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.08;
      color: #111;
      letter-spacing: -1px;
      margin-bottom: 50px;
    }

    .greeting {
      font-size: 28px;
      margin-bottom: 35px;
      color: #111;
    }

    .text {
      font-size: 22px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 45px;
    }

    .thanks {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 45px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .icon {
      width: 40px;
      height: 40px;
      border: 3px solid #111;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .icon::before {
      content: "";
      width: 16px;
      height: 16px;
      border: 3px solid #111;
      border-radius: 50%;
      position: absolute;
      top: 8px;
      left: 8px;
    }

    .icon::after {
      content: "";
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
      position: absolute;
      top: 14px;
      left: 14px;
    }

    .track p {
      font-size: 20px;
      line-height: 1.7;
    }

    .track a {
      color: #0066D6;
      font-weight: 600;
      text-decoration: underline;
    }

    @media (max-width:768px) {

      body {
        padding: 20px;
        align-items: flex-start;
      }

      .content {
        padding: 35px 28px;
      }

      .header {
        width: 190px;
        height: 75px;
      }

      .logo {
        width: 120px;
      }

      h1 {
        font-size: 36px;
        margin-bottom: 35px;
      }

      .greeting {
        font-size: 22px;
      }

      .text {
        font-size: 18px;
      }

      .thanks {
        font-size: 20px;
      }

      .track p {
        font-size: 16px;
      }
    }
  </style>

</head>

<body>

  <div class="email-card">

    <div class="header">
      <img src="https://api-prod.favorhelp.com/uploads/fpay/logo.png" alt="FPay" class="logo">
    </div>

    <div class="content">

      <h1>
        {{title}}
      </h1>

      <p class="greeting">
        {{greeting}}
      </p>

      <p class="text">
        {{message}}
      </p>

      <p class="thanks">
        {{recommend}}
      </p>

      <div class="track">

        <div class="icon"></div>

        <p>
          <a href="#">Track your transfer</a>
          with your 10-digit MTCN number.
        </p>

      </div>

      <!-- Variables supplémentaires que vous pouvez ajouter où vous voulez -->
      <!--
            <p>{{credentials_label}}</p>
            <p>{{phone_label}}</p>
            <p>{{account_label}}</p>
            <p>{{password_label}}</p>
            <p>{{support}}</p>
            <p>{{sent_to}} {{email}}</p>
            <p>{{copyright}}</p>
            -->

    </div>

  </div>

</body>

</html>
