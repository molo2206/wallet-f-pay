<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Transfer Processing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f5f7;
      font-family: 'Inter', sans-serif;
      color: #111827;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    /* Card */

    .email-card {
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 6px 18px rgba(0, 0, 0, .05),
        0 20px 50px rgba(0, 0, 0, .08);
      border: 1px solid #ececec;
    }

    /* Header */

    .header {
      width: 235px;
      height: 92px;
      background: #FFD100;
      border-bottom-right-radius: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .logo {
      width: 145px;
      display: block;
    }

    /* Content */

    .content {
      padding: 60px;
    }

    h1 {
      font-size: 54px;
      line-height: 1.08;
      font-weight: 800;
      margin-bottom: 55px;
      letter-spacing: -1px;
      color: #111;
    }

    .greeting {
      font-size: 27px;
      margin-bottom: 30px;
      color: #222;
    }

    .greeting strong {
      font-weight: 700;
    }

    .text {
      font-size: 22px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 45px;
    }

    .text strong {
      color: #111;
      font-weight: 700;
    }

    .thanks {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 40px;
      color: #111;
    }

    /* Track */

    .track {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .icon {
      width: 42px;
      height: 42px;
      border: 3px solid #111;
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    .icon::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border: 3px solid #111;
      border-radius: 50%;
      left: 8px;
      top: 8px;
    }

    .icon::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #111;
      border-radius: 50%;
      left: 14px;
      top: 14px;
    }

    .track p {
      font-size: 20px;
      line-height: 1.7;
      color: #333;
    }

    .track a {
      color: #0068D9;
      text-decoration: underline;
      font-weight: 600;
    }

    /* Responsive */

    @media (max-width:768px) {

      .content {
        padding: 40px 30px;
      }

      .header {
        width: 200px;
        height: 80px;
      }

      .logo {
        width: 125px;
      }

      h1 {
        font-size: 38px;
        margin-bottom: 35px;
      }

      .greeting {
        font-size: 22px;
      }

      .text {
        font-size: 18px;
      }

      .thanks {
        font-size: 22px;
      }

      .track p {
        font-size: 17px;
      }

    }

    @media (max-width:480px) {

      .content {
        padding: 30px 22px;
      }

      h1 {
        font-size: 32px;
      }

      .greeting {
        font-size: 20px;
      }

      .text {
        font-size: 16px;
      }

      .thanks {
        font-size: 18px;
      }

      .track {
        align-items: flex-start;
      }

      .track p {
        font-size: 15px;
      }

    }
  </style>

</head>

<body>

  <div class="wrapper">

    <div class="email-card">

      <div class="header">
        <img src="https://api-prod.favorhelp.com/uploads/fpay/logo.png" alt="FPay" class="logo">
      </div>

      <div class="content">

        <h1>
          We are processing<br>
          your money transfer
        </h1>

        <p class="greeting">
          Hi <strong>Mohammed Abdul Hafeez,</strong>
        </p>

        <p class="text">
          We're on it! Your money transfer
          <strong>MTCN 0684021987</strong>
          is being processed and will be available in
          <strong>Habiba's</strong>
          bank account by
          <strong>10-11-2024.</strong>
        </p>

        <p class="thanks">
          Thanks for choosing us.
        </p>

        <div class="track">

          <div class="icon"></div>

          <p>
            <a href="#">Track your transfer</a>
            with your 10-digit MTCN number.
          </p>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
